<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1025" />
    <title>Happy Birthday Divs 💜</title>
    <meta name="description" content="Happy Birthday, Divyna Francis. A little story for Mi Amore." />

    <!-- ============================================================
         SOCIAL SHARE / LINK PREVIEW (Open Graph + Twitter)
         WhatsApp needs an ABSOLUTE image url. After you deploy,
         replace the two __SITE__ values below with your real URL,
         e.g. https://for-divs.vercel.app  (no trailing slash).
         ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="For Divs" />
    <meta property="og:title" content="Happy Birthday Divs 💜" />
    <meta
      property="og:description"
      content="Every kilometer between Kerala and Bangalore only reminds me how lucky I am to have you."
    />
    <meta property="og:image" content="__SITE__/og.jpg" />
    <meta property="og:image:secure_url" content="__SITE__/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="900" />
    <meta property="og:image:height" content="1200" />
    <meta property="og:image:alt" content="Divs 💜" />
    <meta property="og:url" content="__SITE__/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Happy Birthday Divs 💜" />
    <meta
      name="twitter:description"
      content="A little story for Mi Amore — Kerala to Bangalore."
    />
    <meta name="twitter:image" content="__SITE__/og.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Dancing+Script:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
